<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <meta charset="UTF-8">
    <title>Login - Consultation Scheduler</title>
    <link rel="stylesheet" href="css/login-page.css">
</head>
<body>
    <div>
        <h2 class="logo">
            <img src="images/synchro-logo.png" alt="Synchro Logo" class="logo_image">
        </h2>
        <p class="welcome_text" >Welcome back! Please login to your account</p>
    </div>

    <div class="card bg-white bg-opacity-25 border-0 rounded-5 shadow p-4 p-md-5">
        <h2 class="text-center text-white mb-4 fw-bold"" >USER LOGIN</h2>

    
        <form id="loginForm" novalidate>
        <div class="mb-3">

            <div class="input-group input-group-lg border rounded-pill bg-white px-3 py-1">
                <span class="material-symbols-outlined align-middle opacity-50">mail</span>
                <input class="form-control boarder-1 bg-transparent fs-5" type="email" id="username" placeholder="Email Address" required>
            </div>
            <span id="emailError" class="text-danger small ms-3 mt-1 d-block"></span>
</div>

            <div>
                <div class="input_container">
                    <span class="material-symbols-outlined input_icon">lock</span>
                    <input class="text_entry_field" type="password" id="password" placeholder="Password" required>
                    <span id="togglePassword" class="material-symbols-outlined toggle_link">
                        visibility
                    </span>
                </div>
                <span id="passwordError" class="inline_error"></span>
            </div>
        

            <div class="d-flex justify-content-between align-items-center mb-4 px-2">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="remember" name="remember">
                    <label class="form-check-label text-white fw-medium" for="remember">Remember me</label>
                </div>
                <a class="text-warning text-decoration-none fw-bold" href="https://www.google.com">Forgot password?</a>
            </div>
        
            <div>
                <button class="btn btn-warning btn-lg w-100 rounded-pill py-3 fw-bolder fs-4 shadow-sm mb-3" type="submit">Login</button>
            </div>
            <div class="text-center">
                <p class="text-white mb-0" >Don't have an account? <a class="new_account_text" href="register-page.html"> Create a new account. </a> </p>
            </div>
        </div>

        <div class="text-center mt-5 text-white opacity-75 small" >
            <a> Designed by students at the University of the Witwatersrand </a>
        </div>
    </form>
    <p id="message"></p>
        </main>

    <script src="js/login-page.js"></script>
</body>
</html>
