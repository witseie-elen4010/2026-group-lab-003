<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Consultation Scheduler</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="css/register-page.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>
</head>
<body>
    <main class="container">
        <h1>Create an Account</h1>
        <form id="registrationForm">
            <div class="registration_fields">
                <div class="input_container">
                    <input class="text_entry_field" type="text" id="name" placeholder="Name">
                </div>
                <span id="nameError" class="inline_error" ></span>
                
                <div class="input_container">
                    <input class="text_entry_field" type="text" id="surname" placeholder="Surname">
                </div>
                <span id="surnameError" class="inline_error" ></span>

                <div class="input_container">
                    <input class="text_entry_field" type="text" id="idNumber" placeholder="Student/Lecturer Number">
                </div>
                <span id="studnoError" class="inline_error" ></span>

                <div class="input_container">
                    <input class="text_entry_field" type="text" id="email" placeholder="Email Address">
                </div>
                <span id="emailError" class="inline_error" ></span>

                <div>
                    <ion-segment mode="ios" value="student" id="role">
                    <ion-segment-button value="student">
                        <ion-label>Student</ion-label>
                    </ion-segment-button>
                    
                    <ion-segment-button value="lecturer">
                        <ion-label>Lecturer</ion-label>
                    </ion-segment-button>
                    </ion-segment>
                </div>

                <div class="input_container">
                    <input class="text_entry_field" type="password" id="password" placeholder="Password" >
                    <span id="togglePassword1" class="material-symbols-outlined toggle_link" >
                        visibility
                    </span>
                </div>
                <span id="passwordError" class="inline_error" ></span>

                <div class="input_container" >
                    <input class="text_entry_field" type="password" id="confirmPassword" placeholder="Confirm Password">
                    <span id="togglePassword2" class="material-symbols-outlined toggle_link">
                        visibility
                    </span>
                </div>

                <span id="error-message" class="inline_error" ></span>

                <div>
                    <button class="register_button" type="submit">Register</button>
                </div>

            </div>

            <div class="footer-links">
                <p class="already_have_text" >Already have an account? <a class="login_here_text" href="login-page.html">Login here.</a> </p>
            </div>
        </form>
    </main>
    <script src="js/register-page.js"></script>
</body>
</html>
