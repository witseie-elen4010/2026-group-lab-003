<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Schedule</title>
    <link rel="stylesheet" href="css/lecturer-dashboard.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="schedule-container">
        <header class="schedule-header">
            <div class="header-left">
                <h1>
                    <i class="fas fa-calendar-alt"></i>
                    My Schedule
                </h1>
                <p class="header-subtitle">Upcoming Consultations</p>
            </div>
            <div class="header-right">
                <button id="refresh-btn" class="btn btn-outline" title="Refresh schedule">
                    <i class="fas fa-sync-alt"></i>
                    <span>Refresh</span>
                </button>
            </div>
        </header>

        <!-- Today's Date -->
        <div class="date-banner">
            <i class="fas fa-calendar-day"></i>
            <span id="current-date">Loading...</span>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="total-sessions">0</div>
                <div class="stat-label">Today's Sessions</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-joined">0</div>
                <div class="stat-label">Students Joined</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="upcoming-count">0</div>
                <div class="stat-label">Upcoming This Week</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="completed-today">0</div>
                <div class="stat-label">Completed Today</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters-section">
            <div class="filter-row">
                <div class="filter-group">
                    <label for="status-filter">
                        <i class="fas fa-tag"></i> Status
                    </label>
                    <select id="status-filter" class="filter-select">
                        <option value="all">All Sessions</option>
                        <option value="upcoming">Upcoming</option>
                        <option value="ongoing">Ongoing</option>
                        <option value="completed">Completed</option>
                        <option value="canceled">Canceled</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="course-filter">
                        <i class="fas fa-book"></i> Course
                    </label>
                    <select id="course-filter" class="filter-select">
                        <option value="all">All Courses</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="date-filter">
                        <i class="fas fa-calendar"></i> Date
                    </label>
                    <select id="date-filter" class="filter-select">
                        <option value="all">All Dates</option>
                        <option value="today">Today</option>
                        <option value="tomorrow">Tomorrow</option>
                        <option value="this-week">This Week</option>
                        <option value="next-week">Next Week</option>
                    </select>
                </div>

                <div class="filter-group flex-grow">
                    <label for="search-input">
                        <i class="fas fa-search"></i> Search
                    </label>
                    <input 
                        type="text" 
                        id="search-input" 
                        class="search-input" 
                        placeholder="Search by student name or course code..."
                    >
                </div>
            </div>
        </div>

        <!-- Schedule List -->
        <div class="schedule-list-container">
            <div id="schedule-list" class="schedule-list">
                <!-- Sessions inserted here -->
            </div>

            <!-- Empty State -->
            <div id="empty-state" class="empty-state hidden">
                <i class="fas fa-calendar-check"></i>
                <h3>No Sessions Scheduled</h3>
                <p>Your upcoming consultations will appear here once students book sessions.</p>
            </div>
        </div>
    </div>

    <!-- Session Detail Modal -->
    <div id="session-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Session Details</h2>
                <button class="close-btn" id="close-session-modal">&times;</button>
            </div>
            <div id="session-detail-content" class="detail-body">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>

    <script src="js/lecturer-dashboard.js"></script>
</body>
</html>
